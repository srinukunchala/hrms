<section class="login-page">
  <div class="login-container">

    <!-- LEFT SIDE : IMAGE ONLY -->
    <div class="login-left">
      <img
        src="assets/images/login-illustration.png"
        alt="greytHR illustration"
        class="login-illustration"
      />

      <button class="spot-btn">Save my Spot!</button>
    </div>

    <!-- RIGHT SIDE : LOGIN -->
    <div class="login-right">
      <div class="login-card">
        <h3>Login to greytHR</h3>
        <p class="help-text">
          Find out the greytHR URL for your company
        </p>

        <label>Official Email or Phone Number *</label>
        <input type="text" placeholder="Type here..." />

        <div class="captcha">
          <input type="checkbox" /> I'm not a robot
        </div>

        <button class="primary-btn">Search</button>

        <p class="signup">
          Don’t have a greytHR account?
        <span routerLink="/signup" class="signup-link">Sign up</span>
        </p>

      </div>
    </div>

  </div>
</section>
