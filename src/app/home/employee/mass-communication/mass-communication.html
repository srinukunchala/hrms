<!-- Breadcrumb -->
<div class="breadcrumb">
  Home &gt; Employee &gt; Mass Communication
</div>

<!-- Info Box -->
<div class="info-box">
  <p>
    From the <b>Mass Communication</b> page, you can send an <b>email or SMS</b>
    to employees. The page also displays a list of previously sent emails and SMS.
  </p>
  <a class="help-link">Hide Help</a>
</div>

<!-- Top Bar -->
<div class="top-bar">
  <button class="primary-btn">Compose</button>
</div>

<!-- Table -->
<div class="table-card">
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Category</th>
          <th>Subject</th>
          <th>Type</th>
          <th>Date</th>
          <th></th>
          <th></th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let msg of messages">
          <td>{{ msg.category }}</td>
          <td>{{ msg.subject }}</td>
          <td>{{ msg.type }}</td>
          <td>{{ msg.date }}</td>
          <td class="icon">✏️</td>
          <td class="icon">🗑️</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
